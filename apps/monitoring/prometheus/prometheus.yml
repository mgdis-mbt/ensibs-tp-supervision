global:
  scrape_interval:     5s
  scrape_timeout:      4s
  evaluation_interval: 10s

# Load and evaluate rules in this file every 'evaluation_interval' seconds.
rule_files:
  - "alert.rules"
  
scrape_configs:
  - job_name: rhapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'rhapi:8080'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']